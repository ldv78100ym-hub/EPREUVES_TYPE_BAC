<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAC BLANC - Exercice 3 avec Corrections</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: {
                typeset: false
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-color: #f0f2f5;
            --page-bg: #ffffff;
            --text-color: #000000;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            font-size: 12pt;
            line-height: 1.5;
        }
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-regenerate {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s;
        }
        .btn-regenerate:hover { background-color: #1a252f; }
        
        .btn-correction {
            background-color: #16a085;
            color: white;
            border: none;
            padding: 4px 10px;
            font-size: 10pt;
            cursor: pointer;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            margin-left: 10px;
            vertical-align: middle;
            transition: background 0.3s;
        }
        .btn-correction:hover { background-color: #117a65; }

        .page {
            background-color: var(--page-bg);
            max-width: 21cm;
            margin: 0 auto 20px auto;
            padding: 2cm;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
        }
        .section-title { font-size: 14pt; font-weight: bold; margin-top: 1.5cm; margin-bottom: 0.5cm; }
        .canvas-container { text-align: center; margin: 20px 0; }
        canvas { border: 1px solid transparent; }
        
        .table-probas {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
        }
        .table-probas th, .table-probas td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        
        li { margin-bottom: 10px; }

        /* Styles pour la modale */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; 
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto; 
            padding: 30px;
            border: 1px solid #888;
            width: 80%; 
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-family: 'Times New Roman', Times, serif;
            font-size: 12pt;
            line-height: 1.6;
            position: relative;
        }
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            position: absolute;
            top: 15px;
            right: 20px;
        }
        .close-btn:hover, .close-btn:focus {
            color: black;
            text-decoration: none;
        }
        .correction-title {
            color: #16a085;
            border-bottom: 2px solid #16a085;
            padding-bottom: 5px;
            margin-top: 0;
        }
        .methode-box {
            background-color: #e8f8f5;
            border-left: 4px solid #16a085;
            padding: 10px 15px;
            margin: 15px 0;
            border-radius: 0 4px 4px 0;
        }

        @media print {
            body { background-color: white; padding: 0; }
            .controls, .btn-correction, .modal { display: none !important; }
            .page { box-shadow: none; margin: 0; padding: 1.5cm; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-regenerate" onclick="generateExam()">Générer de nouvelles valeurs</button>
    </div>

    <div class="page">
        <div class="section-title">Exercice 3 (5 points)</div>
        <div id="exo3-texte"></div>
        
        <div class="canvas-container" style="margin-top: 1cm;">
            <canvas id="canvas-tree" width="500" height="300"></canvas>
            <div><button class="btn-correction" onclick="openModal('q3')">Correction détaillée de l'arbre</button></div>
        </div>
    </div>

    <div id="correction-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 class="correction-title">Correction détaillée</h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // --- UTILITAIRES ---
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        let currentCorrections = {}; // Stocke les corrections générées

        // --- GESTION DE LA MODALE ---
        function openModal(questionId) {
            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = currentCorrections[questionId];
            document.getElementById('correction-modal').style.display = "block";
            // Demande à MathJax de formater les équations nouvellement injectées
            MathJax.typesetPromise([modalBody]);

            // Si c'est la question 3, on dessine l'arbre de correction après un très court délai pour laisser le DOM s'actualiser
            if (questionId === 'q3' && window.drawCorrectionTree) {
                setTimeout(window.drawCorrectionTree, 10);
            }
        }

        function closeModal() {
            document.getElementById('correction-modal').style.display = "none";
        }

        // Fermer la modale si on clique en dehors
        window.onclick = function(event) {
            const modal = document.getElementById('correction-modal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // --- GÉNÉRATION DES DONNÉES ET CORRECTIONS ---
        function generateExam() {
            generateExo3();
            MathJax.typesetPromise();
        }

        function generateExo3() {
            const banquesExo3 = [
                {
                    pop: "salariés d'une entreprise",
                    cat1: "Cadres", cat2: "Employés",
                    prop1: "Parlent anglais", prop2: "Ne parlent pas anglais",
                    varC1: "C", varC2: "E", varP1: "A",
                    defC1: "le salarié interrogé est un cadre", defC2: "le salarié interrogé est un employé",
                    defP1: "le salarié interrogé parle anglais", defP2: "le salarié interrogé ne parle pas anglais",
                    phraseC1: "des cadres", phraseP1: "parlent anglais",
                    interroge: "un salarié", pronom: "il", cat1_fem: false
                },
                {
                    pop: "élèves d'un lycée",
                    cat1: "Filles", cat2: "Garçons",
                    prop1: "Pratiquent un sport", prop2: "Ne pratiquent aucun sport",
                    varC1: "F", varC2: "G", varP1: "S",
                    defC1: "l'élève interrogé est une fille", defC2: "l'élève interrogé est un garçon",
                    defP1: "l'élève interrogé pratique un sport", defP2: "l'élève interrogé ne pratique aucun sport",
                    phraseC1: "des filles", phraseP1: "pratiquent un sport",
                    interroge: "un élève", pronom: "il", cat1_fem: true
                },
                {
                    pop: "pièces produites par une usine",
                    cat1: "Atelier 1", cat2: "Atelier 2",
                    prop1: "Ont un défaut", prop2: "N'ont aucun défaut",
                    varC1: "U", varC2: "D", varP1: "F",
                    defC1: "la pièce provient de l'atelier 1", defC2: "la pièce provient de l'atelier 2",
                    defP1: "la pièce a un défaut", defP2: "la pièce n'a aucun défaut",
                    phraseC1: "des pièces de l'atelier 1", phraseP1: "ont un défaut",
                    interroge: "une pièce", pronom: "elle", cat1_fem: true
                }
            ];

            const ctx = banquesExo3[rand(0, 2)];
            const tot = rand(100, 250); 
            const nC1 = Math.floor(tot * rand(30, 45) / 100); 
            const nC2 = tot - nC1;
            const nP1_C1 = Math.floor(nC1 * rand(20, 70) / 100); 
            const nP1_C2 = Math.floor(nC2 * rand(10, 30) / 100);
            
            const nP2_C1 = nC1 - nP1_C1;
            const nP2_C2 = nC2 - nP1_C2;
            const totP1 = nP1_C1 + nP1_C2;
            const totP2 = tot - totP1;
            const pct = Math.floor((nP1_C1/nC1)*100);

            // Construction de l'interface de l'exercice
            document.getElementById('exo3-texte').innerHTML = `
                <p>Les ${tot} ${ctx.pop} se répartissent de la façon suivante :</p>
                <table class="table-probas">
                    <tr><th></th><th>${ctx.cat1}</th><th>${ctx.cat2}</th><th>TOTAL</th></tr>
                    <tr><th>${ctx.prop1}</th><td>${nP1_C1}</td><td>${nP1_C2}</td><td>${totP1}</td></tr>
                    <tr><th>${ctx.prop2}</th><td>${nP2_C1}</td><td>${nP2_C2}</td><td>${totP2}</td></tr>
                    <tr><th>TOTAL</th><td>${nC1}</td><td>${nC2}</td><td>${tot}</td></tr>
                </table>
                <p>Dans cet exercice, les résultats seront donnés sous forme fractionnaire.</p>
                <ol>
                    <li>
                        <ol type="a">
                            <li>Calculer la fréquence de la catégorie « ${ctx.cat2} » avec la propriété « ${ctx.prop1} ». <button class="btn-correction" onclick="openModal('q1a')">Correction</button></li>
                            <li>Calculer la fréquence de ceux de la propriété « ${ctx.prop2} » parmi la catégorie « ${ctx.cat1} ». <button class="btn-correction" onclick="openModal('q1b')">Correction</button></li>
                        </ol>
                    </li>
                    <li>On tire au sort ${ctx.interroge} au hasard. On note les événements :<br>
                    $${ctx.varC1}$ : « ${ctx.defC1} » ;<br>
                    $${ctx.varC2}$ : « ${ctx.defC2} » ;<br>
                    $${ctx.varP1}$ : « ${ctx.defP1} » ;<br>
                    $\\overline{${ctx.varP1}}$ : « ${ctx.defP2} ».<br>
                        <ol type="a">
                            <li>Traduire par une phrase l'événement $${ctx.varC1} \\cap \\overline{${ctx.varP1}}$. <button class="btn-correction" onclick="openModal('q2a')">Correction</button></li>
                            <li>Calculer $P(${ctx.varC1} \\cap ${ctx.varP1})$, $P(\\overline{${ctx.varP1}})$ et $P(${ctx.varC2} \\cap ${ctx.varP1})$. <button class="btn-correction" onclick="openModal('q2b')">Correction</button></li>
                            <li>Calculer $P_{${ctx.varP1}}(${ctx.varC2})$. <button class="btn-correction" onclick="openModal('q2c')">Correction</button></li>
                            <li>Sachant que ${ctx.interroge} appartient à la catégorie ${ctx.cat2}, calculer la probabilité qu'${ctx.pronom} vérifie la propriété « ${ctx.prop2} ». <button class="btn-correction" onclick="openModal('q2d')">Correction</button></li>
                            <li>Définir à l'aide d'une probabilité conditionnelle la proposition : « ${pct}\\% ${ctx.phraseC1} ${ctx.phraseP1} ». <button class="btn-correction" onclick="openModal('q2e')">Correction</button></li>
                        </ol>
                    </li>
                    <li>Compléter l'arbre suivant avec les valeurs fractionnaires :</li>
                </ol>`;

            // Génération des contenus didactiques des corrections
            currentCorrections = {
                'q1a': `
                    <div class="methode-box">
                        <strong>Méthode et Définition :</strong><br>
                        La fréquence globale d'une sous-population se calcule en faisant le quotient de son effectif par l'effectif total de la population.<br>
                        Formule : $f = \\frac{\\text{Effectif de la sous-population}}{\\text{Effectif Total}}$
                    </div>
                    <p>On cherche la fréquence de « ${ctx.cat2} » avec « ${ctx.prop1} ».</p>
                    <ul>
                        <li>On lit dans le tableau l'effectif correspondant à l'intersection de la colonne "${ctx.cat2}" et de la ligne "${ctx.prop1}" : il y en a <strong>${nP1_C2}</strong>.</li>
                        <li>L'effectif total est de <strong>${tot}</strong>.</li>
                    </ul>
                    <p><strong>Réponse :</strong> La fréquence est de $$\\frac{${nP1_C2}}{${tot}}$$</p>
                `,
                
                'q1b': `
                    <div class="methode-box">
                        <strong>Méthode et Définition (Fréquence conditionnelle ou marginale) :</strong><br>
                        Le mot-clé "parmi" indique que l'on restreint notre population totale de référence à un sous-groupe (ici, la catégorie « ${ctx.cat1} »). On ne divise plus par le total global, mais par le total de ce sous-groupe.<br>
                        Formule : $f_A(B) = \\frac{\\text{Effectif}(A \\cap B)}{\\text{Effectif}(A)}$
                    </div>
                    <p>On cherche la fréquence de « ${ctx.prop2} » parmi « ${ctx.cat1} ».</p>
                    <ul>
                        <li>L'effectif total de la catégorie de référence "${ctx.cat1}" (au bas de la colonne) est <strong>${nC1}</strong>.</li>
                        <li>Parmi eux, le nombre vérifiant "${ctx.prop2}" est <strong>${nP2_C1}</strong>.</li>
                    </ul>
                    <p><strong>Réponse :</strong> La fréquence est de $$\\frac{${nP2_C1}}{${nC1}}$$</p>
                `,

                'q2a': `
                    <div class="methode-box">
                        <strong>Règles de traduction :</strong><br>
                        - Le symbole d'intersection $\\cap$ se traduit en français par la conjonction de coordination <strong>« ET »</strong>.<br>
                        - La barre au-dessus d'une lettre (comme $\\overline{${ctx.varP1}}$) désigne l'<strong>événement contraire</strong> (la négation de l'événement).
                    </div>
                    <p>On décompose :</p>
                    <ul>
                        <li>$${ctx.varC1}$ signifie : « ${ctx.defC1} »</li>
                        <li>$\\overline{${ctx.varP1}}$ signifie : « ${ctx.defP2} » (le contraire de ${ctx.defP1})</li>
                    </ul>
                    <p><strong>Réponse :</strong> $${ctx.varC1} \\cap \\overline{${ctx.varP1}}$ correspond à l'événement :<br>
                    <em>« ${ctx.defC1.charAt(0).toUpperCase() + ctx.defC1.slice(1)} <strong>et</strong> ${ctx.pronom} vérifie la propriété : ${ctx.prop2.toLowerCase()} »</em>.</p>
                `,

                'q2b': `
                    <div class="methode-box">
                        <strong>Théorème (Équiprobabilité) :</strong><br>
                        Lorsqu'on tire au hasard, tous les individus ont la même probabilité d'être choisis (loi équirépartie). La probabilité d'un événement $A$ se calcule par :<br>
                        $P(A) = \\frac{\\text{Nombre de cas favorables}}{\\text{Nombre de cas possibles}}$
                    </div>
                    <ul>
                        <li><strong>Calcul de $P(${ctx.varC1} \\cap ${ctx.varP1})$ :</strong><br>
                        L'événement $${ctx.varC1} \\cap ${ctx.varP1}$ correspond à la case croisant "${ctx.cat1}" et "${ctx.prop1}". Son effectif est ${nP1_C1}. Le total des cas possibles est ${tot}.<br>
                        $$P(${ctx.varC1} \\cap ${ctx.varP1}) = \\frac{${nP1_C1}}{${tot}}$$</li>
                        
                        <li><strong>Calcul de $P(\\overline{${ctx.varP1}})$ :</strong><br>
                        L'événement $\\overline{${ctx.varP1}}$ ("${ctx.prop2}") correspond au total de la ligne du bas. Son effectif est ${totP2}.<br>
                        $$P(\\overline{${ctx.varP1}}) = \\frac{${totP2}}{${tot}}$$</li>
                        
                        <li><strong>Calcul de $P(${ctx.varC2} \\cap ${ctx.varP1})$ :</strong><br>
                        L'événement $${ctx.varC2} \\cap ${ctx.varP1}$ correspond à la case croisant "${ctx.cat2}" et "${ctx.prop1}". Son effectif est ${nP1_C2}.<br>
                        $$P(${ctx.varC2} \\cap ${ctx.varP1}) = \\frac{${nP1_C2}}{${tot}}$$</li>
                    </ul>
                `,

                'q2c': `
                    <div class="methode-box">
                        <strong>Définition et Formule (Probabilité conditionnelle) :</strong><br>
                        $P_{A}(B)$ se lit "probabilité de $B$ sachant $A$". Elle se calcule grâce à la formule :<br>
                        $P_{A}(B) = \\frac{P(A \\cap B)}{P(A)}$<br>
                        <em>Méthode pratique avec un tableau d'effectifs :</em> On peut directement diviser l'effectif de l'intersection par l'effectif total de la condition.<br>
                        $P_{A}(B) = \\frac{\\text{Effectif}(A \\cap B)}{\\text{Effectif}(A)}$
                    </div>
                    <p>Ici, on cherche $P_{${ctx.varP1}}(${ctx.varC2})$. La condition est d'appartenir à la ligne "${ctx.prop1}" (total = ${totP1}).</p>
                    <p>Parmi eux, on regarde combien appartiennent à la colonne "${ctx.cat2}" (effectif = ${nP1_C2}).</p>
                    <p><strong>Réponse :</strong> $$P_{${ctx.varP1}}(${ctx.varC2}) = \\frac{${nP1_C2}}{${totP1}}$$</p>
                `,

                'q2d': `
                    <div class="methode-box">
                        <strong>Méthode (Lecture de probabilité conditionnelle en français) :</strong><br>
                        La locution <strong>"Sachant que"</strong> annonce une probabilité conditionnelle. L'événement connu devient le nouvel univers de référence.
                    </div>
                    <p>L'événement connu (en indice) est $${ctx.varC2}$ ("${ctx.cat2}"). L'événement dont on cherche la probabilité est $\\overline{${ctx.varP1}}$ ("${ctx.prop2}").</p>
                    <p>On cherche donc à calculer $P_{${ctx.varC2}}(\\overline{${ctx.varP1}})$.</p>
                    <ul>
                        <li>On se restreint à la colonne "${ctx.cat2}" dont le total est <strong>${nC2}</strong>.</li>
                        <li>Dans cette colonne, le nombre d'individus vérifiant $\\overline{${ctx.varP1}}$ est <strong>${nP2_C2}</strong>.</li>
                    </ul>
                    <p><strong>Réponse :</strong> $$P_{${ctx.varC2}}(\\overline{${ctx.varP1}}) = \\frac{${nP2_C2}}{${nC2}}$$</p>
                `,

                'q2e': `
                    <div class="methode-box">
                        <strong>Méthode (Modélisation) :</strong><br>
                        Traduire un pourcentage relatif à une sous-population en probabilité conditionnelle.<br>
                        La structure de phrase <em>"X% de la population A vérifient la propriété B"</em> correspond à une probabilité sachant que la condition A est réalisée.
                    </div>
                    <p>La phrase « ${pct}% ${ctx.phraseC1} ${ctx.phraseP1} » restreint l'étude aux individus de la catégorie ${ctx.cat1} (événement $${ctx.varC1}$).</p>
                    <p>L'événement étudié est le fait de vérifier la propriété $${ctx.varP1}$ ("${ctx.phraseP1}").</p>
                    <p>Il s'agit donc de la probabilité conditionnelle de $${ctx.varP1}$ sachant $${ctx.varC1}$.</p>
                    <p><strong>Réponse :</strong> On l'écrit : $$P_{${ctx.varC1}}(${ctx.varP1}) = \\frac{${pct}}{100}$$</p>
                `,

                'q3': `
                    <div class="methode-box">
                        <strong>Règles de construction d'un arbre pondéré :</strong><br>
                        <ul>
                            <li><strong>Règle 1 (Nœud primaire) :</strong> Les probabilités sur les premières branches partant de l'origine (Ω) sont des probabilités simples (ou marginales). La somme des probabilités issues de ce même nœud vaut 1.</li>
                            <li><strong>Règle 2 (Nœuds secondaires) :</strong> Les probabilités sur les branches secondaires sont des probabilités <strong>conditionnelles</strong>, sachant que le chemin précédent a été réalisé. La somme des probabilités issues d'un même nœud secondaire vaut 1.</li>
                        </ul>
                    </div>
                    <p><strong>Branches primaires (Origine Ω) :</strong></p>
                    <ul>
                        <li>Branche du haut vers $${ctx.varC1}$ : $P(${ctx.varC1}) = \\frac{\\text{Total } ${ctx.cat1}}{\\text{Total général}} = \\mathbf{\\frac{${nC1}}{${tot}}}$</li>
                        <li>Branche du bas vers $${ctx.varC2}$ : $P(${ctx.varC2}) = \\frac{\\text{Total } ${ctx.cat2}}{\\text{Total général}} = \\mathbf{\\frac{${nC2}}{${tot}}}$</li>
                    </ul>
                    <p><strong>Branches secondaires (À partir de $${ctx.varC1}$) :</strong></p>
                    <ul>
                        <li>Vers $${ctx.varP1}$ : $P_{${ctx.varC1}}(${ctx.varP1}) = \\frac{\\text{Intersection } ${ctx.varC1} \\cap ${ctx.varP1}}{\\text{Total } ${ctx.cat1}} = \\mathbf{\\frac{${nP1_C1}}{${nC1}}}$</li>
                        <li>Vers $\\overline{${ctx.varP1}}$ : $P_{${ctx.varC1}}(\\overline{${ctx.varP1}}) = \\frac{\\text{Intersection } ${ctx.varC1} \\cap \\overline{${ctx.varP1}}}{\\text{Total } ${ctx.cat1}} = \\mathbf{\\frac{${nP2_C1}}{${nC1}}}$</li>
                    </ul>
                    <p><strong>Branches secondaires (À partir de $${ctx.varC2}$) :</strong></p>
                    <ul>
                        <li>Vers $${ctx.varP1}$ : $P_{${ctx.varC2}}(${ctx.varP1}) = \\frac{\\text{Intersection } ${ctx.varC2} \\cap ${ctx.varP1}}{\\text{Total } ${ctx.cat2}} = \\mathbf{\\frac{${nP1_C2}}{${nC2}}}$</li>
                        <li>Vers $\\overline{${ctx.varP1}}$ : $P_{${ctx.varC2}}(\\overline{${ctx.varP1}}) = \\frac{\\text{Intersection } ${ctx.varC2} \\cap \\overline{${ctx.varP1}}}{\\text{Total } ${ctx.cat2}} = \\mathbf{\\frac{${nP2_C2}}{${nC2}}}$</li>
                    </ul>
                    <div class="canvas-container" style="text-align: center; margin-top: 30px;">
                        <canvas id="canvas-tree-correction" width="500" height="300"></canvas>
                    </div>
                `
            };

            // --- FONCTION DE TRACÉ DE L'ARBRE DE CORRECTION (AVEC FRACTIONS) ---
            window.drawCorrectionTree = function() {
                const canvasCorrection = document.getElementById('canvas-tree-correction');
                if (!canvasCorrection) return;
                const ctxC = canvasCorrection.getContext('2d');
                ctxC.clearRect(0, 0, canvasCorrection.width, canvasCorrection.height);
                const h = canvasCorrection.height;
                ctxC.font = "18px Times New Roman"; ctxC.fillStyle = "black"; ctxC.textAlign = "center"; ctxC.textBaseline = "middle";

                const pOmega = {x: 50, y: h/2}; 
                const pC = {x: 200, y: h/4}; const pE = {x: 200, y: 3*h/4};
                const pCA = {x: 400, y: h/8}; const pCAb = {x: 400, y: 3*h/8}; 
                const pEA = {x: 400, y: 5*h/8}; const pEAb = {x: 400, y: 7*h/8};

                ctxC.lineWidth = 1.5; ctxC.beginPath();
                ctxC.moveTo(pOmega.x + 15, pOmega.y); ctxC.lineTo(pC.x - 15, pC.y);
                ctxC.moveTo(pOmega.x + 15, pOmega.y); ctxC.lineTo(pE.x - 15, pE.y);
                ctxC.moveTo(pC.x + 15, pC.y); ctxC.lineTo(pCA.x - 15, pCA.y);
                ctxC.moveTo(pC.x + 15, pC.y); ctxC.lineTo(pCAb.x - 15, pCAb.y);
                ctxC.moveTo(pE.x + 15, pE.y); ctxC.lineTo(pEA.x - 15, pEA.y);
                ctxC.moveTo(pE.x + 15, pE.y); ctxC.lineTo(pEAb.x - 15, pEAb.y);
                ctxC.stroke();

                ctxC.fillText("Ω", pOmega.x, pOmega.y); 
                ctxC.fillText(ctx.varC1, pC.x, pC.y); 
                ctxC.fillText(ctx.varC2, pE.x, pE.y);
                ctxC.fillText(ctx.varP1, pCA.x, pCA.y); 
                ctxC.fillText(ctx.varP1, pEA.x, pEA.y);
                
                ctxC.fillText(ctx.varP1, pCAb.x, pCAb.y); 
                ctxC.beginPath(); ctxC.moveTo(pCAb.x-7, pCAb.y-12); ctxC.lineTo(pCAb.x+7, pCAb.y-12); ctxC.stroke();
                
                ctxC.fillText(ctx.varP1, pEAb.x, pEAb.y); 
                ctxC.beginPath(); ctxC.moveTo(pEAb.x-7, pEAb.y-12); ctxC.lineTo(pEAb.x+7, pEAb.y-12); ctxC.stroke();

                // Placement des probabilités
                ctxC.font = "16px Times New Roman";
                ctxC.fillStyle = "#16a085"; // Valeurs en couleur pour la correction
                ctxC.fillText(nC1 + "/" + tot, (pOmega.x + pC.x)/2, (pOmega.y + pC.y)/2 - 15); 
                ctxC.fillText(nC2 + "/" + tot, (pOmega.x + pE.x)/2, (pOmega.y + pE.y)/2 + 15);
                ctxC.fillText(nP1_C1 + "/" + nC1, (pC.x + pCA.x)/2, (pC.y + pCA.y)/2 - 10); 
                ctxC.fillText(nP2_C1 + "/" + nC1, (pC.x + pCAb.x)/2, (pC.y + pCAb.y)/2 + 15);
                ctxC.fillText(nP1_C2 + "/" + nC2, (pE.x + pEA.x)/2, (pE.y + pEA.y)/2 - 10); 
                ctxC.fillText(nP2_C2 + "/" + nC2, (pE.x + pEAb.x)/2, (pE.y + pEAb.y)/2 + 15);
            };

            // --- TRACÉ DE L'ARBRE DE L'ÉNONCÉ (AVEC POINTILLÉS) ---
            const canvasTree = document.getElementById('canvas-tree');
            const ctxT = canvasTree.getContext('2d');
            ctxT.clearRect(0, 0, canvasTree.width, canvasTree.height);
            const h = canvasTree.height;
            ctxT.font = "18px Times New Roman"; ctxT.fillStyle = "black"; ctxT.textAlign = "center"; ctxT.textBaseline = "middle";

            const pOmega = {x: 50, y: h/2}; 
            const pC = {x: 200, y: h/4}; const pE = {x: 200, y: 3*h/4};
            const pCA = {x: 400, y: h/8}; const pCAb = {x: 400, y: 3*h/8}; 
            const pEA = {x: 400, y: 5*h/8}; const pEAb = {x: 400, y: 7*h/8};

            ctxT.lineWidth = 1.5; ctxT.beginPath();
            ctxT.moveTo(pOmega.x + 15, pOmega.y); ctxT.lineTo(pC.x - 15, pC.y);
            ctxT.moveTo(pOmega.x + 15, pOmega.y); ctxT.lineTo(pE.x - 15, pE.y);
            ctxT.moveTo(pC.x + 15, pC.y); ctxT.lineTo(pCA.x - 15, pCA.y);
            ctxT.moveTo(pC.x + 15, pC.y); ctxT.lineTo(pCAb.x - 15, pCAb.y);
            ctxT.moveTo(pE.x + 15, pE.y); ctxT.lineTo(pEA.x - 15, pEA.y);
            ctxT.moveTo(pE.x + 15, pE.y); ctxT.lineTo(pEAb.x - 15, pEAb.y);
            ctxT.stroke();

            // Lettres dynamiques
            ctxT.fillText("Ω", pOmega.x, pOmega.y); 
            ctxT.fillText(ctx.varC1, pC.x, pC.y); 
            ctxT.fillText(ctx.varC2, pE.x, pE.y);
            ctxT.fillText(ctx.varP1, pCA.x, pCA.y); 
            ctxT.fillText(ctx.varP1, pEA.x, pEA.y);
            
            ctxT.fillText(ctx.varP1, pCAb.x, pCAb.y); 
            ctxT.beginPath(); ctxT.moveTo(pCAb.x-7, pCAb.y-12); ctxT.lineTo(pCAb.x+7, pCAb.y-12); ctxT.stroke();
            
            ctxT.fillText(ctx.varP1, pEAb.x, pEAb.y); 
            ctxT.beginPath(); ctxT.moveTo(pEAb.x-7, pEAb.y-12); ctxT.lineTo(pEAb.x+7, pEAb.y-12); ctxT.stroke();

            // Pointillés de base pour l'énoncé
            ctxT.font = "italic 16px Times New Roman";
            ctxT.fillText("...", (pOmega.x + pC.x)/2, (pOmega.y + pC.y)/2 - 15); ctxT.fillText("...", (pOmega.x + pE.x)/2, (pOmega.y + pE.y)/2 + 15);
            ctxT.fillText("...", (pC.x + pCA.x)/2, (pC.y + pCA.y)/2 - 10); ctxT.fillText("...", (pC.x + pCAb.x)/2, (pC.y + pCAb.y)/2 + 15);
            ctxT.fillText("...", (pE.x + pEA.x)/2, (pE.y + pEA.y)/2 - 10); ctxT.fillText("...", (pE.x + pEAb.x)/2, (pE.y + pEAb.y)/2 + 15);
        }

        window.onload = generateExam;

    </script>
